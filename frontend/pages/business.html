<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Business — Listify</title>
<link rel="stylesheet" href="../css/style.css">
<style>
.back-link { display:inline-flex;align-items:center;gap:8px;color:var(--text3);font-size:0.9rem;margin-bottom:32px;transition:var(--transition); }
.back-link:hover { color:var(--text2); }

.business-hero {
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;overflow:hidden;margin-bottom:32px;
}
.biz-cover {
  height:260px;background:var(--bg3);position:relative;
  display:flex;align-items:center;justify-content:center;font-size:5rem;
}
.biz-cover img { width:100%;height:100%;object-fit:cover; }
.biz-logo {
  position:absolute;bottom:-36px;left:36px;
  width:72px;height:72px;border-radius:16px;
  background:var(--surface2);border:3px solid var(--bg);
  overflow:hidden;display:grid;place-items:center;font-size:2rem;
}
.biz-header { padding:56px 36px 32px; }
.biz-meta { display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:12px; }
.biz-name { font-size:2rem;font-weight:800; }
.biz-desc { color:var(--text2);line-height:1.75;max-width:680px;margin:12px 0 0; }

.biz-layout { display:grid;grid-template-columns:1fr 340px;gap:28px; }
@media(max-width:860px){ .biz-layout { grid-template-columns:1fr; } }

.info-card { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px; }
.info-card h3 { font-size:0.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:18px; }

.info-row { display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border); }
.info-row:last-child { border-bottom:none; }
.info-icon { font-size:1rem;width:24px;flex-shrink:0;padding-top:1px; }
.info-label { font-size:0.78rem;color:var(--text3);margin-bottom:2px; }
.info-value { font-size:0.9rem;color:var(--text); }

.hours-grid { display:grid;grid-template-columns:1fr 1fr;gap:8px; }
.hour-item { font-size:0.85rem; }
.hour-day { color:var(--text3); }
.hour-time { color:var(--text); }

.service-tag { display:inline-flex;padding:6px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-size:0.85rem;color:var(--text2);margin:4px; }

.images-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:16px; }
.img-thumb { aspect-ratio:1;border-radius:10px;overflow:hidden;background:var(--bg3);cursor:pointer; }
.img-thumb img { width:100%;height:100%;object-fit:cover;transition:var(--transition); }
.img-thumb:hover img { transform:scale(1.05); }

/* lightbox */
.lightbox { position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:300;display:none;place-items:center; }
.lightbox.open { display:grid; }
.lightbox img { max-width:90vw;max-height:90vh;border-radius:12px; }
.lightbox-close { position:absolute;top:20px;right:24px;background:var(--surface);border:none;color:var(--text);width:40px;height:40px;border-radius:10px;cursor:pointer;font-size:18px;display:grid;place-items:center; }
</style>
</head>
<body>
<nav class="navbar">
  <a href="/" class="nav-logo"><div class="nav-logo-icon">L</div>Listi<span>fy</span></a>
  <div class="nav-links"><a href="/">Home</a><a href="/pages/listings.html" class="active">Listings</a></div>
  <div class="nav-actions" id="nav-actions"></div>
</nav>

<div class="page-wrapper">
  <div class="container section">
    <a href="/pages/listings.html" class="back-link">← Back to listings</a>

    <div id="main-content">
      <div style="display:flex;justify-content:center;padding:80px;"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script type="module" src="/js/app.js"></script>
<script type="module">
const id = new URLSearchParams(location.search).get('id');

function openLightbox(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

async function load() {
  if (!id) { window.location.href = '/pages/listings.html'; return; }
  try {
    const b = await apiFetch(`/listings/${id}`);
    document.title = `${b.name} — Listify`;
    renderBusiness(b);
  } catch(e) {
    document.getElementById('main-content').innerHTML = `<div class="empty-state"><div class="empty-icon">😕</div><h3>Business not found</h3><p>${e.message}</p></div>`;
  }
}

function renderBusiness(b) {
  const logoHtml = b.logo_url
    ? `<img src="${API}${b.logo_url}" alt="${b.name}">`
    : `<span>${b.name.charAt(0)}</span>`;

  const imagesHtml = b.images?.length
    ? `<div class="images-grid">${b.images.map(img => `<div class="img-thumb" onclick="openLightbox('${API}${img.image_url}')"><img src="${API}${img.image_url}" alt=""></div>`).join('')}</div>`
    : `<p style="color:var(--text3);font-size:0.9rem;">No images uploaded yet.</p>`;

  const servicesHtml = b.services?.length
    ? b.services.map(s => `<span class="service-tag">${s}</span>`).join('')
    : `<span style="color:var(--text3);font-size:0.9rem;">No services listed.</span>`;

  const hoursHtml = b.opening_hours
    ? Object.entries(b.opening_hours).map(([day,time]) => `<div class="hour-item"><div class="hour-day">${day}</div><div class="hour-time">${time}</div></div>`).join('')
    : `<p style="color:var(--text3);font-size:0.9rem;">Hours not provided.</p>`;

  document.getElementById('main-content').innerHTML = `
    <div class="business-hero">
      <div class="biz-cover" style="${!b.logo_url?'background:var(--surface2);':''}">
        ${b.images?.[0] ? `<img src="${API}${b.images[0].image_url}" alt="${b.name}">` : `<span style="opacity:.2;">${b.name.charAt(0)}</span>`}
        <div class="biz-logo">${logoHtml}</div>
      </div>
      <div class="biz-header">
        <div class="biz-meta">
          <span class="badge badge-accent">${b.category}</span>
          ${b.city ? `<span style="color:var(--text3);font-size:0.85rem;">📍 ${b.city}, ${b.state}</span>` : ''}
        </div>
        <h1 class="biz-name">${b.name}</h1>
        <p class="biz-desc">${b.description}</p>
      </div>
    </div>

    <div class="biz-layout">
      <div>
        <div class="info-card">
          <h3>Services</h3>
          <div>${servicesHtml}</div>
        </div>
        <div class="info-card">
          <h3>Photos</h3>
          ${imagesHtml}
        </div>
        <div class="info-card">
          <h3>Opening Hours</h3>
          <div class="hours-grid">${hoursHtml}</div>
        </div>
      </div>

      <div>
        <div class="info-card">
          <h3>Contact & Location</h3>
          <div class="info-row"><span class="info-icon">📍</span><div><div class="info-label">Address</div><div class="info-value">${b.address}, ${b.city}, ${b.state} ${b.postal_code}, ${b.country}</div></div></div>
          <div class="info-row"><span class="info-icon">📞</span><div><div class="info-label">Phone</div><div class="info-value"><a href="tel:${b.phone}" style="color:var(--accent2);">${b.phone}</a></div></div></div>
          <div class="info-row"><span class="info-icon">✉️</span><div><div class="info-label">Email</div><div class="info-value"><a href="mailto:${b.email}" style="color:var(--accent2);">${b.email}</a></div></div></div>
          ${b.website ? `<div class="info-row"><span class="info-icon">🌐</span><div><div class="info-label">Website</div><div class="info-value"><a href="${b.website}" target="_blank" style="color:var(--accent2);">${b.website.replace(/^https?:\/\//,'')}</a></div></div></div>` : ''}
        </div>

        ${Auth.isLoggedIn() && Auth.user?.id === b.owner_id ? `
        <div class="info-card" style="border-color:rgba(108,99,255,0.3);">
          <h3>Owner actions</h3>
          <div style="display:flex;flex-direction:column;gap:10px;margin-top:4px;">
            <a href="/pages/edit-listing.html?id=${b.id}" class="btn btn-secondary btn-sm">✏️ Edit listing</a>
          </div>
        </div>` : ''}
      </div>
    </div>`;
}

load();

window.openLightbox = openLightbox;
window.load = load;
window.closeLightbox = closeLightbox;
window.renderBusiness = renderBusiness;
</script>
</body>
</html>
