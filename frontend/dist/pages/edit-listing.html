<title>Edit Listing — Listify</title>
<style>
.form-page { max-width:760px;margin:0 auto;padding:48px 0; }
.form-section { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;margin-bottom:20px; }
.form-section-title { font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:6px; }
.form-section-sub { color:var(--text3);font-size:0.87rem;margin-bottom:24px; }
.form-grid { display:flex;flex-direction:column;gap:18px; }

.upload-zone {
  border:2px dashed var(--border2);border-radius:12px;padding:28px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  cursor:pointer;transition:var(--transition);text-align:center;
}
.upload-zone:hover { border-color:var(--accent);background:rgba(108,99,255,0.05); }
.upload-icon { font-size:2rem;opacity:0.5; }

.images-preview { display:flex;flex-wrap:wrap;gap:10px;margin-top:14px; }
.img-preview { position:relative;width:90px;height:90px;border-radius:10px;overflow:hidden;flex-shrink:0; }
.img-preview img { width:100%;height:100%;object-fit:cover; }
.img-preview .overlay { position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;transition:var(--transition); }
.img-preview:hover .overlay { background:rgba(0,0,0,0.5); }
.img-preview .overlay button { opacity:0;transition:var(--transition);background:var(--red);border:none;color:#fff;width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:12px; }
.img-preview:hover .overlay button { opacity:1; }

.services-input-row { display:flex;gap:8px; }
.services-tags { display:flex;flex-wrap:wrap;gap:8px;margin-top:10px; }
.service-tag-item { display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-size:0.85rem; }
.service-tag-item button { background:none;border:none;cursor:pointer;color:var(--text3);padding:0;font-size:12px; }
.service-tag-item button:hover { color:var(--red); }

.logo-preview { width:80px;height:80px;border-radius:14px;overflow:hidden;background:var(--bg3);border:2px solid var(--border2);display:grid;place-items:center;font-size:2rem;flex-shrink:0; }
.logo-preview img { width:100%;height:100%;object-fit:cover; }

.save-bar { position:sticky;bottom:0;background:var(--bg2);border-top:1px solid var(--border);padding:16px 0;margin:0 -24px; }
.save-bar-inner { max-width:760px;margin:0 auto;padding:0 24px;display:flex;justify-content:flex-end;gap:12px; }
</style>
