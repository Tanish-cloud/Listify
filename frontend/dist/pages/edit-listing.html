<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Edit Listing — Listify</title>
<style>
.form-page { max-width:760px;margin:0 auto;padding:48px 0; }
.form-section { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;margin-bottom:20px; }
.form-section-title { font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:6px; }
.form-section-sub { color:var(--text3);font-size:0.87rem;margin-bottom:24px; }
.form-grid { display:flex;flex-direction:column;gap:18px; }

.upload-zone {
  border:2px dashed var(--border2);border-radius:12px;padding:28px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  cursor:pointer;transition:var(--transition);text-align:center;
}
.upload-zone:hover { border-color:var(--accent);background:rgba(108,99,255,0.05); }
.upload-icon { font-size:2rem;opacity:0.5; }

.images-preview { display:flex;flex-wrap:wrap;gap:10px;margin-top:14px; }
.img-preview { position:relative;width:90px;height:90px;border-radius:10px;overflow:hidden;flex-shrink:0; }
.img-preview img { width:100%;height:100%;object-fit:cover; }
.img-preview .overlay { position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;transition:var(--transition); }
.img-preview:hover .overlay { background:rgba(0,0,0,0.5); }
.img-preview .overlay button { opacity:0;transition:var(--transition);background:var(--red);border:none;color:#fff;width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:12px; }
.img-preview:hover .overlay button { opacity:1; }

.services-input-row { display:flex;gap:8px; }
.services-tags { display:flex;flex-wrap:wrap;gap:8px;margin-top:10px; }
.service-tag-item { display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-size:0.85rem; }
.service-tag-item button { background:none;border:none;cursor:pointer;color:var(--text3);padding:0;font-size:12px; }
.service-tag-item button:hover { color:var(--red); }

.logo-preview { width:80px;height:80px;border-radius:14px;overflow:hidden;background:var(--bg3);border:2px solid var(--border2);display:grid;place-items:center;font-size:2rem;flex-shrink:0; }
.logo-preview img { width:100%;height:100%;object-fit:cover; }

.save-bar { position:sticky;bottom:0;background:var(--bg2);border-top:1px solid var(--border);padding:16px 0;margin:0 -24px; }
.save-bar-inner { max-width:760px;margin:0 auto;padding:0 24px;display:flex;justify-content:flex-end;gap:12px; }
</style>
  <script type="module" crossorigin src="/assets/app-B5DUmXyZ.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/app-igT4_H2d.css">
</head>
<body>
<nav class="navbar">
  <a href="/" class="nav-logo"><div class="nav-logo-icon">L</div>Listi<span>fy</span></a>
  <div class="nav-links"><a href="/pages/dashboard.html">Dashboard</a></div>
  <div class="nav-actions" id="nav-actions"></div>
</nav>

<div class="page-wrapper">
  <div class="container">
    <div class="form-page">
      <a href="/pages/dashboard.html" style="display:inline-flex;align-items:center;gap:8px;color:var(--text3);font-size:0.9rem;margin-bottom:28px;">← Dashboard</a>
      <h1 style="font-size:2rem;font-weight:800;margin-bottom:6px;">Edit listing</h1>
      <p style="color:var(--text2);margin-bottom:36px;" id="listing-name-sub">Loading...</p>

      <div id="form-content">
        <div style="display:flex;justify-content:center;padding:80px;"><div class="spinner"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
if (!Auth.isLoggedIn()) window.location.href = '/pages/login.html';

const id = new URLSearchParams(location.search).get('id');
if (!id) window.location.href = '/pages/dashboard.html';

const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
let services = [];
let biz = null;

async function load() {
  try {
    biz = await apiFetch(`/listings/${id}`);
    document.getElementById('listing-name-sub').textContent = `Editing: ${biz.name}`;
    services = biz.services || [];
    renderForm();
  } catch(e) { toast(e.message, 'error'); }
}

function renderForm() {
  document.getElementById('form-content').innerHTML = `
    <!-- IMAGES & LOGO -->
    <div class="form-section">
      <div class="form-section-title">Logo</div>
      <div class="form-section-sub">Upload a square logo for your business.</div>
      <div style="display:flex;align-items:flex-start;gap:20px;flex-wrap:wrap;">
        <div class="logo-preview" id="logo-preview">
          ${biz.logo_url ? `<img src="${API}${biz.logo_url}" alt="">` : '🏪'}
        </div>
        <div style="flex:1;">
          <label class="upload-zone" for="logo-file">
            <div class="upload-icon">☁️</div>
            <strong>Click to upload logo</strong>
            <p>PNG, JPG or WEBP · square image recommended</p>
          </label>
          <input type="file" id="logo-file" accept="image/*" style="display:none;" onchange="uploadLogo(this)">
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Photos</div>
      <div class="form-section-sub">Add photos to make your listing stand out.</div>
      <label class="upload-zone" for="img-files">
        <div class="upload-icon">📸</div>
        <strong>Click to upload photos</strong>
        <p>PNG, JPG or WEBP · multiple files allowed</p>
      </label>
      <input type="file" id="img-files" accept="image/*" multiple style="display:none;" onchange="uploadImages(this)">
      <div class="images-preview" id="images-preview">
        ${(biz.images||[]).map(img => `
          <div class="img-preview">
            <img src="${API}${img.image_url}" alt="">
            <div class="overlay"><button onclick="">✕</button></div>
          </div>`).join('')}
      </div>
    </div>

    <!-- BASIC INFO -->
    <div class="form-section">
      <div class="form-section-title">Basic information</div>
      <div class="form-section-sub">Update your business details.</div>
      <div class="form-grid">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Business name</label>
            <input class="form-input" type="text" id="name" value="${biz.name}">
          </div>
          <div class="form-group">
            <label class="form-label">Category</label>
            <select class="form-select" id="category">${CATEGORIES.map(c=>`<option value="${c}"${c===biz.category?' selected':''}>${c}</option>`).join('')}</select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-textarea" id="description" rows="4">${biz.description}</textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Services</label>
          <div class="services-input-row">
            <input class="form-input" type="text" id="service-input" placeholder="Add a service…">
            <button type="button" class="btn btn-secondary" onclick="addService()">Add</button>
          </div>
          <div class="services-tags" id="services-tags"></div>
        </div>
      </div>
    </div>

    <!-- LOCATION -->
    <div class="form-section">
      <div class="form-section-title">Location</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Address</label><input class="form-input" id="address" value="${biz.address}"></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">City</label><input class="form-input" id="city" value="${biz.city}"></div>
          <div class="form-group"><label class="form-label">State</label><input class="form-input" id="state" value="${biz.state}"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Country</label><input class="form-input" id="country" value="${biz.country}"></div>
          <div class="form-group"><label class="form-label">Postal code</label><input class="form-input" id="postal_code" value="${biz.postal_code}"></div>
        </div>
      </div>
    </div>

    <!-- CONTACT -->
    <div class="form-section">
      <div class="form-section-title">Contact</div>
      <div class="form-grid">
        <div class="form-row">
          <div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="phone" value="${biz.phone}"></div>
          <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="email" value="${biz.email}"></div>
        </div>
        <div class="form-group"><label class="form-label">Website</label><input class="form-input" id="website" value="${biz.website||''}"></div>
      </div>
    </div>

    <!-- HOURS -->
    <div class="form-section">
      <div class="form-section-title">Opening hours</div>
      <div class="form-grid" id="hours-grid"></div>
    </div>

    <div class="save-bar">
      <div class="save-bar-inner">
        <a href="/pages/dashboard.html" class="btn btn-ghost">Cancel</a>
        <button class="btn btn-primary btn-lg" id="save-btn" onclick="saveChanges()">Save changes</button>
      </div>
    </div>`;

  // hours
  const hg = document.getElementById('hours-grid');
  DAYS.forEach(day => {
    const val = biz.opening_hours?.[day] || '';
    hg.innerHTML += `<div class="form-row" style="align-items:center;">
      <div style="display:flex;align-items:center;gap:12px;">
        <input type="checkbox" id="chk-${day}" ${val?'checked':''} style="width:16px;height:16px;accent-color:var(--accent);">
        <label for="chk-${day}" style="font-size:0.9rem;font-weight:500;min-width:90px;">${day}</label>
      </div>
      <input class="form-input" type="text" id="hrs-${day}" value="${val}" placeholder="9:00 AM – 6:00 PM">
    </div>`;
  });

  document.getElementById('service-input').addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();addService();} });
  renderServices();
}

function addService() {
  const val = document.getElementById('service-input').value.trim();
  if (!val || services.includes(val)) return;
  services.push(val);
  renderServices();
  document.getElementById('service-input').value = '';
}
function removeService(s) { services = services.filter(x=>x!==s); renderServices(); }
function renderServices() {
  document.getElementById('services-tags').innerHTML = services.map(s =>
    `<div class="service-tag-item">${s}<button onclick="removeService('${s}')">✕</button></div>`).join('');
}

async function uploadLogo(input) {
  if (!input.files[0]) return;
  const fd = new FormData(); fd.append('file', input.files[0]);
  try {
    const res = await apiFetch(`/listings/${id}/logo`, { method:'POST', body:fd });
    document.getElementById('logo-preview').innerHTML = `<img src="${API}${res.logo_url}" alt="">`;
    toast('Logo updated!', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

async function uploadImages(input) {
  const preview = document.getElementById('images-preview');
  for (const file of input.files) {
    const fd = new FormData(); fd.append('file', file);
    try {
      const img = await apiFetch(`/listings/${id}/images`, { method:'POST', body:fd });
      preview.innerHTML += `<div class="img-preview"><img src="${API}${img.image_url}" alt=""><div class="overlay"><button>✕</button></div></div>`;
      toast('Photo uploaded!', 'success');
    } catch(e) { toast(e.message, 'error'); }
  }
}

async function saveChanges() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving…';

  const opening_hours = {};
  DAYS.forEach(day => {
    if (document.getElementById(`chk-${day}`)?.checked) {
      const v = document.getElementById(`hrs-${day}`)?.value.trim();
      if (v) opening_hours[day] = v;
    }
  });

  const payload = {
    name: document.getElementById('name').value,
    category: document.getElementById('category').value,
    description: document.getElementById('description').value,
    address: document.getElementById('address').value,
    city: document.getElementById('city').value,
    state: document.getElementById('state').value,
    country: document.getElementById('country').value,
    postal_code: document.getElementById('postal_code').value,
    phone: document.getElementById('phone').value,
    email: document.getElementById('email').value,
    website: document.getElementById('website').value || null,
    opening_hours: Object.keys(opening_hours).length ? opening_hours : null,
    services: services.length ? services : null,
  };

  try {
    await apiFetch(`/listings/${id}`, { method:'PUT', body:JSON.stringify(payload) });
    toast('Listing updated!', 'success');
    btn.disabled = false; btn.innerHTML = 'Save changes';
  } catch(e) {
    toast(e.message, 'error');
    btn.disabled = false; btn.innerHTML = 'Save changes';
  }
}

load();
</script>
</body>
</html>
