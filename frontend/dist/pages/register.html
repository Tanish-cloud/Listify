<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Create account — Listify</title>
<style>
body { display:grid; place-items:center; min-height:100vh; padding:40px 0; }
body::before {
  content:''; position:fixed; inset:0; pointer-events:none;
  background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(108,99,255,0.12) 0%, transparent 70%);
}
.auth-card {
  width:100%;max-width:480px;padding:44px;
  background:var(--surface);border:1px solid var(--border2);border-radius:24px;
  animation:cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes cardIn { from{opacity:0;transform:translateY(16px) scale(0.97)} }
.auth-logo { display:flex;justify-content:center;margin-bottom:28px; }
.auth-logo a { font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;display:flex;align-items:center;gap:10px; }
.auth-logo span { color:var(--accent); }
.auth-title { font-size:1.5rem;font-weight:800;text-align:center;margin-bottom:6px; }
.auth-sub { color:var(--text3);text-align:center;font-size:0.9rem;margin-bottom:28px; }
.auth-form { display:flex;flex-direction:column;gap:16px; }
.auth-footer { text-align:center;margin-top:20px;color:var(--text3);font-size:0.9rem; }
.auth-footer a { color:var(--accent2); }
.auth-footer a:hover { text-decoration:underline; }

.perks { display:flex;flex-direction:column;gap:10px;margin-bottom:28px; }
.perk { display:flex;align-items:center;gap:10px;font-size:0.88rem;color:var(--text2); }
.perk-icon { width:28px;height:28px;border-radius:8px;background:rgba(108,99,255,0.12);display:grid;place-items:center;flex-shrink:0;font-size:0.85rem; }
</style>
  <script type="module" crossorigin src="/assets/register-CNJPSKuh.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/app-DjkSlvHv.js">
  <link rel="stylesheet" crossorigin href="/assets/app-igT4_H2d.css">
</head>
<body>
<div class="auth-card">
  <div class="auth-logo">
    <a href="/"><div class="nav-logo-icon">L</div>Listi<span>fy</span></a>
  </div>
  <h1 class="auth-title">List your business</h1>
  <p class="auth-sub">Create a free account to get started</p>

  <div class="perks">
    <div class="perk"><div class="perk-icon">✓</div>Create and manage listings</div>
    <div class="perk"><div class="perk-icon">📸</div>Upload photos and logo</div>
    <div class="perk"><div class="perk-icon">🔍</div>Get discovered by customers</div>
  </div>

  <form class="auth-form" id="reg-form" onsubmit="handleRegister(event)">
    <div class="form-group">
      <label class="form-label">Full name</label>
      <input class="form-input" type="text" id="full_name" placeholder="Your full name" required>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="email" placeholder="you@example.com" required>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="password" placeholder="Min. 8 characters" required minlength="8">
      <span class="form-error" id="reg-error"></span>
    </div>
    <button type="submit" class="btn btn-primary btn-lg" id="submit-btn">Create free account</button>
  </form>

  <div class="auth-footer">Already have an account? <a href="/pages/login.html">Sign in</a></div>
</div>

</body>
</html>
