<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sign in — Listify</title>
<style>
body { display:grid; place-items:center; min-height:100vh; background:var(--bg); }
body::before {
  content:''; position:fixed; inset:0; pointer-events:none;
  background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(108,99,255,0.12) 0%, transparent 70%);
}

.auth-card {
  width:100%; max-width:440px; padding:44px;
  background:var(--surface); border:1px solid var(--border2);
  border-radius:24px; position:relative;
  animation: cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes cardIn { from{opacity:0;transform:translateY(16px) scale(0.97)} }

.auth-logo { display:flex;justify-content:center;margin-bottom:32px; }
.auth-logo a { font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;display:flex;align-items:center;gap:10px; }
.auth-logo span { color:var(--accent); }
.auth-logo .nav-logo-icon { width:36px;height:36px;font-size:18px; }

.auth-title { font-size:1.6rem;font-weight:800;text-align:center;margin-bottom:6px; }
.auth-sub { color:var(--text3);text-align:center;font-size:0.9rem;margin-bottom:32px; }

.auth-form { display:flex;flex-direction:column;gap:18px; }

.auth-footer { text-align:center;margin-top:24px;color:var(--text3);font-size:0.9rem; }
.auth-footer a { color:var(--accent2); }
.auth-footer a:hover { text-decoration:underline; }

.or-divider { display:flex;align-items:center;gap:12px;color:var(--text3);font-size:0.82rem; }
.or-divider::before,.or-divider::after { content:'';flex:1;height:1px;background:var(--border); }
</style>
  <script type="module" crossorigin src="/assets/login-DAH1khhC.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/app-yIULqX0W.js">
  <link rel="stylesheet" crossorigin href="/assets/app-igT4_H2d.css">
</head>
<body>
<div class="auth-card">
  <div class="auth-logo">
    <a href="/"><div class="nav-logo-icon">L</div>Listi<span>fy</span></a>
  </div>
  <h1 class="auth-title">Welcome back</h1>
  <p class="auth-sub">Sign in to manage your business listings</p>

  <form class="auth-form" id="login-form">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="email" placeholder="you@example.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="password" placeholder="Your password" required autocomplete="current-password">
      <span class="form-error" id="login-error"></span>
    </div>
    <button type="submit" class="btn btn-primary btn-lg" id="submit-btn" style="margin-top:4px;">
      Sign in
    </button>
  </form>

  <div class="auth-footer">
    Don't have an account? <a href="/pages/register.html">Create one free</a>
  </div>
</div>

</body>
</html>
